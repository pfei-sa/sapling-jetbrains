name: Verify Plugin
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      # Caches the Gradle dependency cache (incl. the large IntelliJ IDE distributions), wrapper,
      # build cache, and configuration cache. Writes only from the default branch; PRs read-only.
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and test
        run: ./gradlew test buildPlugin
      # The Plugin Verifier downloads its target IDEs (IC 242/243/251/252 + IU 253/2026.1.4) to its
      # own home (~/.pluginVerifier/ides), OUTSIDE ~/.gradle, so setup-gradle doesn't cover them.
      # Keyed on build.gradle.kts, which lists the IDEs — the key invalidates when that set changes.
      - name: Cache Plugin Verifier IDEs
        uses: actions/cache@v4
        with:
          path: ~/.pluginVerifier/ides
          key: plugin-verifier-ides-${{ hashFiles('build.gradle.kts') }}
          restore-keys: plugin-verifier-ides-
      - name: Verify plugin
        run: ./gradlew verifyPlugin
