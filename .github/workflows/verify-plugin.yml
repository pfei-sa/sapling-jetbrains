name: Verify Plugin
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build and test
        run: ./gradlew test buildPlugin
      - name: Verify plugin
        run: ./gradlew verifyPlugin
